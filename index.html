<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --beige:        #f3ede2;
  --beige-card:   rgba(248,243,234,0.93);
  --beige-center: rgba(252,248,242,0.98);
  --ink:          #322c27;
  --ink-mid:      #6b6059;
  --ink-soft:     #a89e94;
  --line:         rgba(140,120,100,0.28);
  --shadow-sm:    0 2px 8px rgba(80,58,38,0.09), 0 1px 3px rgba(80,58,38,0.07);
  --shadow-md:    0 6px 22px rgba(80,58,38,0.15), 0 2px 7px rgba(80,58,38,0.09);
  --shadow-lg:    0 16px 44px rgba(80,58,38,0.22), 0 5px 14px rgba(80,58,38,0.13);
}

html {
  overflow-y: scroll;
}
body {
  width: 100%;
  min-height: 300vh;
  background: var(--beige);
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
}
.page-center {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 1;
}
.page-center > * { pointer-events: all; }

/* ── Straight grid background ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(to right, rgba(148,126,104,0.10) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(148,126,104,0.10) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
}

/* Vignette */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 75% 68% at 50% 50%, transparent 35%, rgba(185,162,130,0.10) 100%);
  pointer-events: none;
}

/* ── SVG filter defs ── */
.svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

/* ── Scrapbook stage — absolute positioning ── */
.stage {
  position: relative;
  z-index: 1;
  width:  460px;
  height: 460px;
  flex-shrink: 0;
}

/* ── Shared card base ── */
.card {
  position: absolute;
  border-radius: 2px;
  background: var(--beige-card);
  transition:
    transform 0.40s cubic-bezier(.22,.68,0,1.15),
    box-shadow 0.40s ease,
    z-index 0s 0s;
}

/* Wobbly pencil border */
.card::after {
  content: '';
  position: absolute; inset: 0;
  border: 1.5px solid rgba(130,108,84,0.30);
  border-radius: 2px;
  filter: url(#wobbly);
  pointer-events: none;
  transition: border-color 0.3s ease, filter 0.3s ease;
}
.card:hover::after {
  border-color: rgba(100,78,55,0.52);
  filter: none;
}

/* ──────────────────────────────────────────
   CENTER CARD  (210×210, z-index:5, centred)
   stage center = 230,230
   card top-left = 230-105=125, 230-105=125
   ────────────────────────────────────────── */
.center-card {
  width:  210px;
  height: 210px;
  left:   125px;
  top:    125px;
  z-index: 5;
  background: var(--beige-center);
  box-shadow: var(--shadow-md);
  cursor: default;
  perspective: 800px;
}
.center-card:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: var(--shadow-lg);
  z-index: 15;
}

/* Flip */
.flip-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(.45,0,.55,1);
}
.center-card:hover .flip-inner { transform: rotateY(180deg); }

.flip-front, .flip-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  padding: 18px;
}
.flip-front { align-items: flex-start; justify-content: flex-end; }

.front-figure {
  position: absolute;
  right: 0; top: 0;
  width: 105px; height: 158px;
  object-fit: cover; object-position: 50% 8%;
  mix-blend-mode: multiply;
  border-radius: 0 2px 0 0;
  opacity: 0.93;
}
.front-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10.5px; font-weight: 300;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mid); margin-bottom: 5px;
}
.front-heading {
  font-family: 'Caveat', cursive;
  font-size: 30px; font-weight: 700;
  color: var(--ink); line-height: 1.05;
}

.flip-back {
  transform: rotateY(180deg);
  align-items: flex-start; justify-content: center;
  background: var(--beige-center);
  padding: 20px;
}
.back-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--ink-soft); margin-bottom: 14px;
}
.back-link {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 9px; text-decoration: none;
  color: var(--ink-mid);
  font-family: 'Caveat', cursive;
  font-size: 16px; font-weight: 500;
  letter-spacing: 0.03em;
  transition: color 0.2s;
}
.back-link:hover { color: var(--ink); }
.back-link svg { flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s; }
.back-link:hover svg { opacity: 0.85; }
.back-divider {
  width: 100%; height: 1px;
  background: var(--line);
  margin: 10px 0 12px;
  filter: url(#wobbly2);
}

/* ──────────────────────────────────────────
   SATELLITE CARDS  (148×148)
   Overlap the center card by ~42px on each inner edge.
   center-card inner edges: left=125, top=125, right=335, bottom=335
   sat right/bottom edge = center + 42px inside → 125+42=167
   sat left edge = 167-148 = 19
   sat left/top edge when on right/bottom side = 335-42=293

   So all four corners:
   TL: left:19,  top:19
   TR: left:293, top:19
   BL: left:19,  top:293
   BR: left:293, top:293
   ────────────────────────────────────────── */
.sat {
  width:  148px;
  height: 148px;
  z-index: 2; /* behind center (5) */
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  padding: 13px 14px;
  text-decoration: none;
  cursor: pointer;
}

/* Individual rotations — natural "slipped under" feel */
.tl { left: 19px;  top:  19px;  transform: rotate(-4.5deg); transform-origin: bottom right; }
.tr { left: 293px; top:  19px;  transform: rotate( 4.0deg); transform-origin: bottom left; }
.bl { left: 19px;  top: 293px;  transform: rotate( 3.5deg); transform-origin: top right;   }
.br { left: 293px; top: 293px;  transform: rotate(-3.0deg); transform-origin: top left;    }

/* On hover: slide out from under, come to front */
.sat:hover {
  z-index: 20;
  box-shadow: var(--shadow-lg);
}
.tl:hover { transform: rotate(0deg) translate(-6px, -6px) scale(1.06); }
.tr:hover { transform: rotate(0deg) translate( 6px, -6px) scale(1.06); }
.bl:hover { transform: rotate(0deg) translate(-6px,  6px) scale(1.06); }
.br:hover { transform: rotate(0deg) translate( 6px,  6px) scale(1.06); }

.sat-title {
  font-family: 'IM Fell English', serif;
  font-size: 18px; line-height: 1.2;
  color: var(--ink); font-style: italic;
}

/* Decorative icon top corner */
.sat-icon {
  position: absolute; top: 12px; right: 12px;
  opacity: 0.35;
  transition: opacity 0.3s;
}
.sat:hover .sat-icon { opacity: 0.62; }

/* Arrow hint */
.sat-arrow {
  position: absolute; bottom: 11px; right: 12px;
  opacity: 0;
  transform: translate(-5px, 5px);
  transition: opacity 0.25s, transform 0.28s;
}
.sat:hover .sat-arrow { opacity: 0.4; transform: translate(0,0); }

/* ── Entrance animations ── */
@keyframes rise {
  from { opacity:0; transform-origin: center; opacity:0; }
  to   { opacity:1; }
}
/* We handle entrance with just opacity so rotation is preserved */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.center-card { animation: fadeIn 0.5s ease 0.0s both; }
.tl          { animation: fadeIn 0.5s ease 0.10s both; }
.tr          { animation: fadeIn 0.5s ease 0.15s both; }
.bl          { animation: fadeIn 0.5s ease 0.20s both; }
.br          { animation: fadeIn 0.5s ease 0.25s both; }

/* ── Responsive ── */
@media (max-width: 520px) {
  .stage { width: 340px; height: 340px; }
  .center-card { width:160px; height:160px; left:90px; top:90px; }
  .sat { width:112px; height:112px; }
  .tl { left:14px; top:14px; }
  .tr { left:214px; top:14px; }
  .bl { left:14px; top:214px; }
  .br { left:214px; top:214px; }
  .front-heading { font-size:24px; }
  .sat-title { font-size:14px; }
}

/* ══ PHOTO STRIPS ══ */
.strip {
  position: fixed;
  top: -20vh;
  width: 82px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  z-index: 2;
  will-change: transform;
  pointer-events: none;
}
.strip-left  { left: 16px; }
.strip-right { right: 16px; }

.photo-frame {
  position: relative;
  width: 82px; height: 110px;
  flex-shrink: 0;
  background: #faf5ed;
  box-shadow: 3px 5px 14px rgba(70,50,30,0.20), 1px 2px 4px rgba(70,50,30,0.10);
  overflow: hidden;
}
.photo-frame::after {
  content: '';
  position: absolute; inset: 0;
  border: 1.5px solid rgba(115,92,68,0.26);
  pointer-events: none;
  filter: url(#wobbly);
}
.photo-frame img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  filter: sepia(10%) contrast(0.95) brightness(1.03);
}
.photo-caption {
  position: absolute; bottom: -17px;
  left: 0; right: 0; text-align: center;
  font-family: 'Caveat', cursive;
  font-size: 9.5px; color: var(--ink-soft);
  letter-spacing: 0.05em; opacity: 0.65;
}
/* Mobile Optimization */
@media (max-width: 768px) {
  /* 1. Push strips to the background */
  .strip {
    z-index: 0 !important; /* Higher numbers are "closer" to you; 0 is the back */
    opacity: 0.6;          /* Making them slightly transparent helps legibility */
    pointer-events: none;  /* Prevents the strips from blocking clicks on buttons */
  }

  /* 2. Ensure the center cards stay on top */
  .center-container {
    position: relative;
    z-index: 10;
  }

  /* 3. Adjust Strip positions so they don't cover the text */
  .strip-left {
    left: -20px;
    transform: scale(0.8); /* Shrink them slightly for small screens */
  }

  .strip-right {
    right: -20px;
    transform: scale(0.8);
  }

  /* 4. Fix Satellite Cards from overlapping */
  .satellite-card {
    position: relative !important; /* Changes from absolute to relative to stack vertically */
    left: auto !important;
    right: auto !important;
    top: auto !important;
    margin: 20px auto;
    width: 90%;
    transform: none !important;
  }
}
</style>

    tick = false;
  }
  window.addEventListener('scroll', function(){
    if(!tick){ requestAnimationFrame(upd); tick=true; }
  },{passive:true});
})();
</script>
