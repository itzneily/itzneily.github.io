#particles-canvas {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
}

/* ── Layout ── */
.page {
  position: fixed; inset: 0; z-index: 10;
  display: flex;
  align-items: stretch;
}

/* LEFT: heading block */
.left {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 12vh 0 0 7vw;
}

/* Back link */
.back-btn {
  position: fixed;
  top: 32px; left: 40px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.22em;
  color: rgba(212,175,55,0.6);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.3s;
  z-index: 20;
  display: flex; align-items: center; gap: 8px;
}
.back-btn::before {
  content: '←';
  font-size: 14px;
}
.back-btn:hover { color: var(--gold); }

/* Eyebrow label */
.eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 10.5px;
  font-weight: 300;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.55);
  margin-bottom: 18px;
}

/* Main heading */
.main-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 200;
  font-style: italic;
  font-size: clamp(80px, 11vw, 148px);
  line-height: 1.0;
  padding-bottom: 0.12em;
  color: var(--gold);
  text-shadow:
    0 0 40px rgba(212,175,55,0.3),
    0 0 80px rgba(212,175,55,0.12),
    0 2px 4px rgba(0,0,0,0.8);
  position: relative;
  overflow: visible;
}



.title-line { display: block; }
.title-line-sub {
  display: block;
  font-size: clamp(64px, 9vw, 122px);
  padding-left: 0.5em;
  color: rgba(212,175,55,0.78);
}

/* Gold rule — draws in left-to-right on load */
.rule {
  width: 90px; height: 1px;
  background: linear-gradient(to right, var(--gold), rgba(212,175,55,0.0));
  margin-top: 28px;
  opacity: 0;
  transform-origin: left center;
  animation: drawLine 1.6s cubic-bezier(0.4,0,0.2,1) 1.2s forwards;
}
@keyframes drawLine {
  0%   { opacity: 0; clip-path: inset(0 100% 0 0); }
  10%  { opacity: 0.7; }
  100% { opacity: 0.7; clip-path: inset(0 0% 0 0); }
}

/* RIGHT: collections panel */
.right {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 5vw 0 0;
  gap: 0;
}

.collections-label {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.40);
  margin-bottom: 22px;
  align-self: flex-end;
}

/* Collection button */
.coll-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  width: 220px;
  margin-bottom: 14px;
  padding: 18px 24px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  border: 1px solid rgba(212,175,55,0.18);
  border-radius: 10px;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition:
    transform 0.32s cubic-bezier(.22,.68,0,1.15),
    box-shadow 0.32s ease,
    border-color 0.32s ease,
    backdrop-filter 0.32s ease;
}

.coll-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(161,18,18,0.12) 0%, rgba(212,175,55,0.06) 100%);
  opacity: 0;
  transition: opacity 0.32s ease;
  border-radius: 10px;
}
.coll-btn:hover::before { opacity: 1; }

.coll-btn:hover {
  transform: scale(1.04) translateX(-4px);
  border-color: rgba(212,175,55,0.50);
  box-shadow:
    0 0 22px rgba(212,175,55,0.18),
    0 0 45px rgba(161,18,18,0.22),
    inset 0 0 18px rgba(212,175,55,0.05);
  backdrop-filter: blur(22px) saturate(1.4);
  -webkit-backdrop-filter: blur(22px) saturate(1.4);
}

.coll-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 300;
  font-style: italic;
  color: var(--white);
  letter-spacing: 0.06em;
  line-height: 1.1;
  transition: color 0.3s;
}
.coll-btn:hover .coll-name {
  color: rgba(212,175,55,0.92);
}

.coll-tag {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.30);
  margin-top: 6px;
  transition: color 0.3s;
}
.coll-btn:hover .coll-tag {
  color: rgba(212,175,55,0.6);
}

/* Arrow on right of button */
.coll-arrow {
  position: absolute;
  right: 18px; top: 50%;
  transform: translateY(-50%) translateX(6px);
  opacity: 0;
  color: var(--gold);
  font-size: 14px;
  transition: opacity 0.25s, transform 0.28s;
}
.coll-btn:hover .coll-arrow {
  opacity: 0.7;
  transform: translateY(-50%) translateX(0);
}

/* ── Custom cursor ── */
.cursor {
  position: fixed;
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, opacity 0.2s;
  mix-blend-mode: screen;
}
.cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1px solid rgba(212,175,55,0.45);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.12s ease, width 0.25s, height 0.25s;
}

/* Description / disclaimer */
.desc-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px, 1.1vw, 15px);
  font-weight: 300;
  font-style: italic;
  color: rgba(245,245,245,0.38);
  letter-spacing: 0.06em;
  line-height: 1.65;
  margin-top: 18px;
  max-width: 320px;
  opacity: 0;
  animation: fadeUp 1s ease 2.0s forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
.eyebrow    { animation: fadeUp 0.7s ease 0.3s both; }
.main-title { animation: fadeUp 0.9s ease 0.5s both; }
.coll-btn:nth-child(2) { animation: fadeUp 0.6s ease 0.55s both; }
.coll-btn:nth-child(3) { animation: fadeUp 0.6s ease 0.72s both; }
.coll-btn:nth-child(4) { animation: fadeUp 0.6s ease 0.89s both; }
.collections-label     { animation: fadeUp 0.6s ease 0.40s both; }
</style>
</head>
<body>

<!-- Custom cursor -->
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="curRing"></div>

<!-- Background -->
<div class="bg"></div>
<div class="bg-overlay"></div>

<!-- Particle canvas -->
<canvas id="particles-canvas"></canvas>

<!-- Back link -->
<a class="back-btn" href="index.html">Portfolio</a>

<!-- Main layout -->
<div class="page">

  <!-- LEFT: Title -->
  <div class="left">
    <div class="eyebrow">Neelima Asok &nbsp;·&nbsp; Collections</div>
    <div class="main-title">
      <span class="title-line">Fashion</span>
      <span class="title-line-sub">Design</span>
    </div>
    <div class="rule"></div>
    <p class="desc-text">Originally conceived &amp; crafted<br/>for college fashion show competitions.</p>
  </div>

  <!-- RIGHT: Collections -->
  <div class="right">
    <div class="collections-label">Collections</div>

    <a class="coll-btn" href="sati-collection.html">
      <div class="coll-name">"Sati" Collection</div>
      <div class="coll-tag">Devotion &amp; Fire</div>
      <span class="coll-arrow">→</span>
    </a>

    <a class="coll-btn" href="sinners-collection.html">
      <div class="coll-name">"Sinners" Collection</div>
      <div class="coll-tag">Dark &amp; Transgressive</div>
      <span class="coll-arrow">→</span>
    </a>

    <a class="coll-btn" href="righteous-collection.html">
      <div class="coll-name">"Righteous" Collection</div>
      <div class="coll-tag">Grace &amp; Power</div>
      <span class="coll-arrow">→</span>
    </a>
  </div>

</div>

<script>
// ── Custom cursor ──
const cur = document.getElementById('cur');
const ring = document.getElementById('curRing');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let rx = mx, ry = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px';
  cur.style.top  = my + 'px';
});

(function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
})();

// enlarge ring near buttons
document.querySelectorAll('.coll-btn').forEach(b => {
  b.addEventListener('mouseenter', () => {
    ring.style.width = '56px'; ring.style.height = '56px';
    ring.style.borderColor = 'rgba(212,175,55,0.7)';
  });
  b.addEventListener('mouseleave', () => {
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(212,175,55,0.45)';
  });
});

// ── Particle dust ──
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

const PARTS = 55;
const parts = Array.from({length: PARTS}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.3,
  vx: (Math.random() - 0.5) * 0.3,
  vy: -Math.random() * 0.4 - 0.1,
  life: Math.random(),
  maxLife: 0.6 + Math.random() * 0.4,
  hue: Math.random() > 0.55 ? 'gold' : 'red',
}));

// cursor-attracted extra sparks
let sparks = [];
document.addEventListener('mousemove', e => {
  if (Math.random() > 0.65) return;
  sparks.push({
    x: e.clientX, y: e.clientY,
    vx: (Math.random()-0.5)*1.5,
    vy: -Math.random()*2 - 0.5,
    r: Math.random()*1.2+0.3,
    life: 1.0,
    hue: Math.random() > 0.4 ? 'gold' : 'red',
  });
  if (sparks.length > 60) sparks.shift();
});

function drawPart(p) {
  const alpha = Math.sin(p.life / p.maxLife * Math.PI) * 0.55;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  if (p.hue === 'gold') {
    ctx.fillStyle = `rgba(212,175,55,${alpha})`;
  } else {
    ctx.fillStyle = `rgba(180,30,10,${alpha * 0.8})`;
  }
  ctx.fill();
}

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  parts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.life += 0.004;
    if (p.life > p.maxLife || p.y < -10) {
      p.x = Math.random() * canvas.width;
      p.y = canvas.height + 5;
      p.life = 0;
    }
    drawPart(p);
  });

  sparks = sparks.filter(s => s.life > 0);
  sparks.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.04; // gravity
    s.life -= 0.035;
    const a = s.life * 0.7;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.hue === 'gold'
      ? `rgba(230,190,60,${a})`
      : `rgba(200,40,10,${a})`;
    ctx.fill();
  });

  requestAnimationFrame(animParticles);
}
animParticles();
</script>
</body>
</html>
